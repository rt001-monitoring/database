/* ================== HITUNG MASA DINAS ================== */
function hitungMasa(tmt) {

  if (!tmt) return "-";

  let start;

  // format dd/mm/yyyy
  if (typeof tmt === "string" && tmt.includes("/")) {

    const p = tmt.split("/");

    const hari = parseInt(p[0], 10);
    const bulan = parseInt(p[1], 10) - 1;
    const tahun = parseInt(p[2], 10);

    start = new Date(tahun, bulan, hari);
  }

  else {

    start = new Date(tmt);
  }

  if (isNaN(start.getTime())) return "-";

  const today = new Date();

  // reset jam
  today.setHours(0,0,0,0);
  start.setHours(0,0,0,0);

  // kalau masa depan
  if (start > today) {
    return "BELUM MASUK";
  }

  let tahun = today.getFullYear() - start.getFullYear();
  let bulan = today.getMonth() - start.getMonth();
  let hari = today.getDate() - start.getDate();

  if (hari < 0) {

    bulan--;

    const lastMonth = new Date(
      today.getFullYear(),
      today.getMonth(),
      0
    ).getDate();

    hari += lastMonth;
  }

  if (bulan < 0) {

    tahun--;
    bulan += 12;
  }

  return `${tahun} th ${bulan} bln ${hari} hr`;
}
function formatTanggal(tgl) {

  if (!tgl) return "-";

  // Jika sudah format Indonesia dd/mm/yyyy
  if (typeof tgl === "string" && tgl.includes("/")) {

    const p = tgl.split("/");

    // pastikan dd/mm/yyyy
    if (p.length === 3) {

      const hari = p[0].padStart(2, "0");
      const bulan = p[1].padStart(2, "0");
      const tahun = p[2];

      return `${hari}/${bulan}/${tahun}`;
    }
  }

  // Jika Date object / ISO
  const d = new Date(tgl);

  if (isNaN(d.getTime())) return "-";

  const hari = String(d.getDate()).padStart(2, "0");
  const bulan = String(d.getMonth() + 1).padStart(2, "0");
  const tahun = d.getFullYear();

  return `${hari}/${bulan}/${tahun}`;
}

// Fullscreen untuk Android WebView / PWA
function forceFullscreen() {
  const elem = document.documentElement;

  if (elem.requestFullscreen) {
    elem.requestFullscreen().catch(()=>{});
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  }
}

// Deteksi jika dijalankan sebagai PWA atau WebView
function isStandalone() {
  return (window.matchMedia('(display-mode: standalone)').matches || 
          window.navigator.standalone === true);
}

// Jika PWA → langsung fullscreen
if (isStandalone()) {
  setTimeout(forceFullscreen, 500);
}

// Jika Android WebView → auto fullscreen
if (navigator.userAgent.includes("wv") || navigator.userAgent.includes("Android")) {
  setTimeout(forceFullscreen, 800);
}

// Browser biasa tetap butuh klik pertama
document.addEventListener("click", function() {
  forceFullscreen();
}, { once: true });
</script>
