<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>evolution is my REVOLUTION</title>

<style>
body{
  background:black;
  color:#00ff00;
  font-family:"Courier New", monospace;
  padding:20px;
  font-size:12px;
  overflow:hidden;
}

#loading{
  white-space:pre-wrap;
}

.hidden{
  display:none;
}

/* TERMINAL */
#terminal-wrapper{
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  border:1px solid #00ff00;
  padding:10px;
  background:#000;
}

pre{
  margin:0;
  white-space:pre;
  line-height:1.4;
  font-family:"Courier New", monospace;
  font-size:12px;
  letter-spacing:0;
  width:max-content;
  min-width:100%;
}

/* Cursor */
.typing{
  border-right:2px solid #00ff00;
  animation:blinkCursor .7s infinite;
}

@keyframes blinkCursor{
  50%{
    border-color:transparent;
  }
}

/* Blink merah */
.blink-red{
  color:#ff0000;
  animation:blinkRed .5s infinite;
}

@keyframes blinkRed{
  0%,100%{
    color:#ff0000;
    text-shadow:0 0 5px #ff0000;
  }
  50%{
    color:#330000;
    text-shadow:none;
  }
}

/* PRIORITAS */
.blink-X{
  color:#ffff00;
  font-weight:bold;
  animation:blinkX .6s infinite;
}

@keyframes blinkX{
  0%,100%{
    color:#ffff00;
    text-shadow:0 0 6px #ffff00;
  }
  50%{
    color:#333300;
    text-shadow:none;
  }
}

/* running text */
#runningText{
  color:#00ff00;
  white-space:nowrap;
  overflow:hidden;
  font-weight:bold;
  margin-bottom:10px;
}

#runningText span{
  display:inline-block;
  padding-left:100%;
  animation:runText 15s linear infinite;
}

@keyframes runText{
  from{
    transform:translateX(0);
  }
  to{
    transform:translateX(-100%);
  }
}

/* BUTTON */
.button-container{
  text-align:center;
  margin-top:20px;
}

button{
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  padding:8px 20px;
  font-size:12px;
  cursor:pointer;
  border-radius:8px;
  margin:0 10px;
  transition:.3s;
  font-family:"Courier New", monospace;
}

button:hover{
  background:#00ff00;
  color:black;
}

.download-btn{
  color:#ff0000;
  border-color:#ff0000;
  animation:blinkRed .5s infinite;
}

.download-btn:hover{
  background:#ff0000;
  color:black;
  animation:none;
}

/* RESPONSIVE */
@media(max-width:900px){
  pre{
    font-size:10px;
  }
}

@media(max-width:700px){
  pre{
    font-size:8px;
  }
}

@media(max-width:500px){
  pre{
    font-size:7px;
  }
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
<p>>> initializing connection...</p>
<p class="hidden">>>> accessing database node...</p>
<p class="hidden">>>> verifying security clearance...</p>
<p class="hidden">>>> clearance level verified ✓</p>
<p class="hidden">>>> retrieving iuran warga RT 001...</p>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<div id="runningText">
<span>
DATA INI BERSIFAT RAHASIA - HANYA UNTUK LINGKUNGAN RT 001 RW 001
</span>
</div>

<div id="terminal-wrapper">
<pre id="terminal" class="typing"></pre>
</div>

</div>

<!-- BUTTON -->
<div class="button-container hidden" id="buttons">

<button onclick="window.location.href='database.html'">
back to DATABASE
</button>

<button class="download-btn" onclick="downloadFile()">
⬇ DOWNLOAD PDF
</button>

</div>

<script>
/* ================= LOADING ================= */

const lines = document.querySelectorAll("#loading p");

let delay = 800;

lines.forEach((line, idx)=>{

  setTimeout(()=>{

    line.classList.remove("hidden");

    if(idx === lines.length - 1){

      setTimeout(()=>{

        document.getElementById("loading").style.display="none";

        document.getElementById("main")
        .classList.remove("hidden");

        startTyping();

      },1000);
    }

  }, delay * (idx + 1));

});

/* ================= FETCH DATA ================= */

async function fetchData(){

  try{

    const url =
    "https://script.google.com/macros/s/AKfycbxG2QC7-7XV85pCJA32jLscOaHa_UCoRSeAIlFmtKZ2OC_UVH9riEjxSLaNbcdzDwW4/exec";

    const res = await fetch(url);

    if(!res.ok){
      throw new Error("HTTP ERROR");
    }

    return await res.json();

  }catch(err){

    console.error(err);

    return [];
  }
}

/* ================= FIX WIDTH ================= */

function fix(text, len){

  text = String(text || "");

  if(text.length > len){
    return text.substring(0, len - 1) + " ";
  }

  return text.padEnd(len, " ");
}

/* ================= DOWNLOAD PDF ================= */

async function downloadFile(){

  try{

    const url =
    "https://script.google.com/macros/s/AKfycbyWOEHcGgdQzfju_kbsvFbO6chxbZY-8eW29rNnD6xipU1IZSx3kOeYZzfZPyWcWRVq/exec";

    const response = await fetch(url);

    if(!response.ok){
      throw new Error("HTTP ERROR");
    }

    const base64 = await response.text();

    const binary = atob(base64);

    const bytes = new Uint8Array(binary.length);

    for(let i=0;i<binary.length;i++){
      bytes[i] = binary.charCodeAt(i);
    }

    const blob = new Blob([bytes], {
      type:"application/pdf"
    });

    const blobUrl = URL.createObjectURL(blob);

    const link = document.createElement("a");

    link.href = blobUrl;
    link.download = "iuran_rt001.pdf";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(blobUrl);

  }catch(err){

    alert("DOWNLOAD FAILED");

    console.error(err);
  }
}

/* ================= EFEK KETIK ================= */

async function startTyping(){

  const terminal =
  document.getElementById("terminal");

  const header =
`---------------------------------------------------------------------------------------------------------------
FILE           : IURAN WARGA RT 001
CLASSIFICATION : `;

  const rahasia = "RAHASIA";

  terminal.textContent = header;

  const span = document.createElement("span");

  span.className = "blink-red";

  terminal.appendChild(span);

  let i = 0;

  function ketik(){

    if(i < rahasia.length){

      span.textContent += rahasia.charAt(i);

      i++;

      setTimeout(ketik,40);

    }else{

      tampilkanData();
    }
  }

  ketik();
}

/* ================= TAMPILKAN DATA ================= */

async function tampilkanData(){

  const terminal =
  document.getElementById("terminal");

  terminal.innerHTML +=
`

---------------------------------------------------------------------------------------------------------------
NO   NAMA                          JAN      FEB      MAR      APR      MEI      JUN      JUL      AGS      SEP      OKT      NOV      DES
---------------------------------------------------------------------------------------------------------------
`;

  try{

    const data = await fetchData();

    if(!Array.isArray(data)){

      terminal.innerHTML += `
DATABASE ERROR
`;

      return;
    }

    data.forEach(row=>{

      let line =
`${fix(row.no,5)}${fix(row.nama,30)}${fix(row.jan,9)}${fix(row.feb,9)}${fix(row.mart,9)}${fix(row.aprl,9)}${fix(row.mei,9)}${fix(row.jun,9)}${fix(row.jul,9)}${fix(row.agst,9)}${fix(row.sept,9)}${fix(row.okt,9)}${fix(row.nov,9)}${fix(row.des,9)}\n`;

      const ket =
      String(row.keterangan || "")
      .toUpperCase();

      if(ket.includes("PRIORITAS")){

        terminal.innerHTML +=
        `<span class="blink-X">${line}</span>`;

      }else{

        terminal.innerHTML += line;
      }

    });

    terminal.innerHTML +=
`
---------------------------------------------------------------------------------------------------------------
* Data diperbarui otomatis dari Spreadsheet.
* Informasi hanya untuk lingkungan RT 001 RW 001.
---------------------------------------------------------------------------------------------------------------
`;

  }catch(err){

    terminal.innerHTML +=
`
SYSTEM ERROR

${err}
`;

    console.error(err);
  }

  terminal.classList.remove("typing");

  document.getElementById("buttons")
  .classList.remove("hidden");
}

/* ================= FULLSCREEN ================= */

function forceFullscreen(){

  const elem = document.documentElement;

  if(elem.requestFullscreen){

    elem.requestFullscreen().catch(()=>{});

  }else if(elem.webkitRequestFullscreen){

    elem.webkitRequestFullscreen();
  }
}

function isStandalone(){

  return (
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true
  );
}

if(isStandalone()){

  setTimeout(forceFullscreen,500);
}

if(
  navigator.userAgent.includes("wv") ||
  navigator.userAgent.includes("Android")
){

  setTimeout(forceFullscreen,800);
}

document.addEventListener("click",function(){

  forceFullscreen();

},{ once:true });

</script>

</body>
</html>
