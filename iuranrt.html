<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>evolution is my REVOLUTION</title>
<style>
body{
  background:black;
  color:#00ff00;
  font-family:"Courier New", monospace;
  padding:20px;
  font-size:12px;
}
pre{
  white-space:pre-wrap;
  line-height:1.5;
}
.typing{
  border-right:2px solid #00ff00;
  animation:blink 0.7s infinite;
}
@keyframes blink{50%{border-color:transparent;}}
.blink-red{
  color:red;
  animation:redblink 0.5s infinite;
}
@keyframes redblink{
  0%,100%{color:red;}
  50%{color:#330000;}
}
.hidden{display:none;}
button{
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  padding:8px 15px;
  cursor:pointer;
  font-family:monospace;
}
button:hover{background:#00ff00;color:black;}
#tableContainer{
  margin-top:20px;
  overflow-x:auto;
}
table{
  border-collapse:collapse;
  width:100%;
  font-size:10px;
}
th,td{
  border:1px solid #00ff00;
  padding:4px;
  text-align:center;
}
th{font-weight:bold;}
table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed; /* 🔥 INI PENTING BIAR TIDAK DOBEL LEBAR */
}

th, td {
  border: 1px solid #00ff00;
  padding: 4px;
  font-size: 10px;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
</style>
</head>
<body>

<div id="loading">
  <p>>> loading system...</p>
</div>

<div id="main" class="hidden">
  <pre id="terminal" class="typing"></pre>
  <div id="tableContainer"></div>
</div>

<div id="buttons" class="hidden">
  <button onclick="location.href='database.html'">BACK</button>
  <button onclick="downloadFile()">DOWNLOAD PDF</button>
</div>

<script>
const JSON_URL = "https://script.google.com/macros/s/AKfycbxG2QC7-7XV85pCJA32jLscOaHa_UCoRSeAIlFmtKZ2OC_UVH9riEjxSLaNbcdzDwW4/exec"; // ganti ini
const PDF_URL = "https://script.google.com/macros/s/AKfycbyWOEHcGgdQzfju_kbsvFbO6chxbZY-8eW29rNnD6xipU1IZSx3kOeYZzfZPyWcWRVq/exec";   // ganti ini

/* LOADING */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("main").classList.remove("hidden");
  startTyping();
},1000);

/* FETCH DATA */
async function fetchData(){
  try{
    const res = await fetch(JSON_URL);
    return await res.json();
  }catch(e){
    console.log(e);
    return [];
  }
}

/* DOWNLOAD PDF */
async function downloadFile(){
  try{
    const res = await fetch(PDF_URL);
    const base64 = await res.text();
    const bin = atob(base64);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    const blob = new Blob([arr],{type:"application/pdf"});
    const url = URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="file.pdf";
    a.click();
  }catch(e){ alert("ERROR DOWNLOAD"); }
}

/* TYPING */
async function startTyping(){
  const t=document.getElementById("terminal");
  let text="SYSTEM ONLINE...\nCLASSIFICATION: ";
  let i=0;
  function type(){
    if(i<text.length){ t.textContent+=text[i++]; setTimeout(type,30); }
    else{
      t.innerHTML+=" <span class='blink-red'>RAHASIA</span>\n\n";
      loadTable();
    }
  }
  type();
}

/* TABLE */
async function loadTable(){
  const data = await fetchData();
  let html = `
  <table>
    <tr>
      <th>No</th>
      <th>Nama</th>
      <th>Jan</th>
      <th>Feb</th>
      <th>Mar</th>
      <th>Apr</th>
      <th>Mei</th>
      <th>Jun</th>
      <th>Jul</th>
      <th>Agst</th>
      <th>Sept</th>
      <th>Okt</th>
      <th>Nov</th>
      <th>Des</th>
      <th>Keterangan</th>
    </tr>
  `;

  data.forEach((r,index)=>{
    html += `
    <tr>
      <td>${index+1}</td>
      <td>${r.nama||""}</td>
      <td>${r.jan||""}</td>
      <td>${r.feb||""}</td>
      <td>${r.mart||""}</td>
      <td>${r.aprl||""}</td>
      <td>${r.mei||""}</td>
      <td>${r.jun||""}</td>
      <td>${r.jul||""}</td>
      <td>${r.agst||""}</td>
      <td>${r.sept||""}</td>
      <td>${r.okt||""}</td>
      <td>${r.nov||""}</td>
      <td>${r.des||""}</td>
      <td>${r.keterangan||""}</td>
    </tr>
    `;
  });

  html += "</table>";
  document.getElementById("tableContainer").innerHTML=html;
  document.getElementById("buttons").classList.remove("hidden");
}
</script>
</body>
</html>
