<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>evolution is my REVOLUTION</title>

<style>
body {
  background-color: black;
  color: #00ff00;
  font-family: "Courier New", monospace;
  padding: 20px;
  font-size: 12px;
  text-align: left;
  overflow-x: hidden;
}

pre {
  white-space: pre-wrap;
  word-wrap: break-word;
  letter-spacing: 1px;
  line-height: 1.5;
  transform: scale(0.9);
  transform-origin: top left;
}

/* Cursor blinking */
.typing {
  border-right: 2px solid #00ff00;
  animation: blinkCursor 0.7s infinite;
}
@keyframes blinkCursor { 50% { border-color: transparent; } }

/* Blink merah */
.blink-red {
  color: #ff0000;
  animation: blinkRed 0.45s infinite;
}
@keyframes blinkRed {
  0%, 100% { color: #ff0000; }
  50% { color: #330000; }
}

/* PRIORITAS — teks kuning berkedip (menonjol) */
.blink-prioritas {
  color: #ffff00;
  font-weight: bold;
  animation: blinkPrior 0.6s infinite;
}
@keyframes blinkPrior {
  0%   { color: #ffff00; text-shadow: 0 0 6px #ffff00; }
  50%  { color: #333300; text-shadow: none; }
  100% { color: #ffff00; text-shadow: 0 0 6px #ffff00; }
}

/* PNS kuning (tanpa animasi) */
.yellow {
  color: #00ff00;
  font-weight: bold;
}

.hidden { display: none; }

/* Tombol bawah */
.button-container {
  text-align: center;
  margin-top: 20px;
}
button {
  background-color: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  padding: 8px 20px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 8px;
  margin: 0 10px;
  transition: 0.3s;
  font-family: "Courier New", monospace;
}
button:hover {
  background-color: #00ff00;
  color: black;
}

/* Tombol download merah */
button.download-btn {
  color: #ff0000;
  border-color: #ff0000;
  animation: blinkRed 0.5s infinite;
}
button.download-btn:hover {
  background-color: #ff0000;
  color: black;
  animation: none;
}

/* Running text */
#runningText {
  color: #00ff00;
  white-space: nowrap;
  overflow: hidden;
  font-weight: bold;
  margin-bottom: 10px;
}
#runningText span {
  display: inline-block;
  padding-left: 100%;
  animation: runText 15s linear infinite;
}
@keyframes runText {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* RESPONSIVE SUPAYA MUAT 1 BARIS */
pre {
  white-space: pre !important;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden !important;
}

#terminal { font-size: 10px !important; }

@media (max-width: 1100px) { #terminal { font-size: 8px !important; } }
@media (max-width: 800px)  { #terminal { font-size: 7px !important; } }
@media (max-width: 600px)  { #terminal { font-size: 6px !important; } }
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <p>>> initializing connection...</p>
  <p class="hidden">>>> accessing database node...</p>
  <p class="hidden">>>> verifying security clearance...</p>
  <p class="hidden">>>> clearance level verified ✓</p>
  <p class="hidden">>>> retrieving jabatan kosong...</p>
</div>

<!-- MAIN -->
<div id="main" class="hidden">
  <div id="runningText">
    <span>⚠ DATA INI BERSIFAT RAHASIA - HANYA UNTUK LINGKUNGAN PUSLAT KODIKLATAU ⚠ </span>
  </div>
  <pre id="terminal" class="typing"></pre>
</div>

<!-- TOMBOL -->
<div class="button-container hidden" id="buttons">  
  <button onclick="window.location.href='database.html'">back to DATABASE</button>
  <button class="download-btn" onclick="downloadFile()">
  ⬇ DOWNLOAD PDF
</button>
</div>

<script>
/* ================== LOADING ================== */
const lines = document.querySelectorAll("#loading p");
let delay = 800;

lines.forEach((line, idx) => {
  setTimeout(() => {
    line.classList.remove("hidden");
    if (idx === lines.length - 1) {
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("main").classList.remove("hidden");
        startTyping();
      }, 1000);
    }
  }, delay * (idx + 1));
});

/* ================== FETCH DATA JABATAN KOSONG ================== */
async function fetchData() {
  try {
    const url =
      "https://script.google.com/macros/s/AKfycbxG2QC7-7XV85pCJA32jLscOaHa_UCoRSeAIlFmtKZ2OC_UVH9riEjxSLaNbcdzDwW4/exec";

    const res = await fetch(url);
    if (!res.ok) {
      throw new Error("HTTP ERROR");
    }
    const text = await res.text();
    console.log(text);
    return JSON.parse(text);
  } catch(err) {
    console.error(err);
    return [];
  }
}

/* ================== DOWNLOAD PDF ================== */
async function downloadFile() {

  try {

    const url =
      "https://script.google.com/macros/s/AKfycbyWOEHcGgdQzfju_kbsvFbO6chxbZY-8eW29rNnD6xipU1IZSx3kOeYZzfZPyWcWRVq/exec";

    const response = await fetch(url);
if (!response.ok) {
  throw new Error("HTTP ERROR");
}
const base64 = await response.text();
const binary = atob(base64);
const bytes = new Uint8Array(binary.length);
for (let i = 0; i < binary.length; i++) {
  bytes[i] = binary.charCodeAt(i);
}
const blob = new Blob([bytes], {
  type: "application/pdf"
});
const blobUrl = URL.createObjectURL(blob);
const link = document.createElement("a");
link.href = blobUrl;
link.download = "jabatan_kosong.pdf";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
URL.revokeObjectURL(blobUrl);
  } catch(err) {

    alert("DOWNLOAD FAILED");
    console.error(err);
  }
}

/* ================== EFEK KETIK ================== */
async function startTyping() {

  const terminal = document.getElementById("terminal");

  const textBefore = `
====================================
| FILE: JABATAN KOSONG PUSLAT       |
| CLASSIFICATION: `;

  const rahasia = "RAHASIA";

  const textAfterTop = `
====================================
`;

  const tableHeader = `

--------------------------------------------------------------------------------------------------------------
`;

  const footer = `
--------------------------------------------------------------------------------------------------------------
* Data jabatan kosong diperbarui otomatis dari Spreadsheet.
* Informasi hanya untuk lingkungan PUSLAT KODIKLATAU.
--------------------------------------------------------------------------------------------------------------
`;

  let i = 0, step = 0;
  let spanRahasia;

  function type() {

    if (step === 0) {
      if (i < textBefore.length) {
        terminal.textContent += textBefore.charAt(i++);
        return setTimeout(type, 1);
      }
      step = 1;
      i = 0;
      spanRahasia = document.createElement("span");
      spanRahasia.classList.add("blink-red");
      terminal.appendChild(spanRahasia);
      return type();
    }

    if (step === 1) {
      if (i < rahasia.length) {
        spanRahasia.textContent += rahasia.charAt(i++);
        return setTimeout(type, 30);
      }
      step = 2;
      i = 0;
      return type();
    }

    if (step === 2) {
      if (i < textAfterTop.length) {
        terminal.innerHTML += textAfterTop.charAt(i++);
        return setTimeout(type, 1);
      }
      step = 3;
      terminal.innerHTML += tableHeader;
      return tampilkanData();
    }
  }

  type();
}

/* ================== TAMPILKAN DATA ================== */
async function tampilkanData() {

  const terminal = document.getElementById("terminal");

  try {

    const data = await fetchData();
    if (!Array.isArray(data)) {
      terminal.innerHTML += `

[ DATABASE ERROR ]
INVALID JSON RESPONSE

`;

      return;
    }

    data.forEach(row => {

      let line =
`${String(row.no || "").padEnd(5)}${String(row.nama || "").padEnd(32)}${String(row.golongan || "").padEnd(10)}${String(row.pangkat || "").padEnd(26)}${String(row.korps || "").padEnd(20)}${String(row.keterangan || "")}\n`;

      if (
        String(row.pangkat || "")
        .toUpperCase()
        .includes("PNS")
      ) {
        line = `<span class="yellow">${line}</span>`;
      }

      const keterangan =
        String(row.keterangan || "")
        .toUpperCase();

      if (keterangan.includes("PRIORITAS")) {

        terminal.innerHTML +=
          `<span class="blink-prioritas">${line}</span>`;

      } else {

        terminal.innerHTML += line;
      }
    });

    terminal.innerHTML += `
--------------------------------------------------------------------------------------------------------------
* Data jabatan kosong diperbarui otomatis dari Spreadsheet.
* Informasi hanya untuk lingkungan PUSLAT KODIKLATAU.
--------------------------------------------------------------------------------------------------------------
`;

  } catch(err) {

    terminal.innerHTML += `

[ SYSTEM ERROR ]

${err}

`;

    console.error(err);
  }

  terminal.classList.remove("typing");

  document.getElementById("buttons")
    .classList.remove("hidden");
}

</script>
<script>
// Fullscreen untuk Android WebView / PWA
function forceFullscreen() {
  const elem = document.documentElement;

  if (elem.requestFullscreen) {
    elem.requestFullscreen().catch(()=>{});
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  }
}

// Deteksi jika dijalankan sebagai PWA atau WebView
function isStandalone() {
  return (window.matchMedia('(display-mode: standalone)').matches || 
          window.navigator.standalone === true);
}

// Jika PWA → langsung fullscreen
if (isStandalone()) {
  setTimeout(forceFullscreen, 500);
}

// Jika Android WebView → auto fullscreen
if (navigator.userAgent.includes("wv") || navigator.userAgent.includes("Android")) {
  setTimeout(forceFullscreen, 800);
}

// Browser biasa tetap butuh klik pertama
document.addEventListener("click", function() {
  forceFullscreen();
}, { once: true });
</script>

</body>
</html>
