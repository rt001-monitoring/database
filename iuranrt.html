<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>terminal system</title>

<style>
body{
  background:black;
  color:#00ff00;
  font-family:"Courier New", monospace;
  padding:20px;
  font-size:12px;
}

pre{
  white-space:pre-wrap;
  line-height:1.5;
}

.typing{
  border-right:2px solid #00ff00;
  animation:blink 0.7s infinite;
}

@keyframes blink{50%{border-color:transparent;}}

.hidden{display:none;}

button{
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  padding:8px 15px;
  cursor:pointer;
  font-family:monospace;
}

button:hover{
  background:#00ff00;
  color:black;
}

/* TABLE */
#tableContainer{
  margin-top:15px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:10px;
}

th,td{
  border:1px solid #00ff00;
  padding:4px;
  text-align:center;
}

th{
  font-weight:bold;
}
</style>
</head>

<body>

<div id="loading">
  <p>>> loading system...</p>
</div>

<div id="main" class="hidden">

  <!-- TERMINAL (TETAP UI LAMA) -->
  <pre id="terminal" class="typing"></pre>

  <!-- TABLE TAMBAHAN (TIDAK MERUSAK UI) -->
  <div id="tableContainer"></div>

</div>

<div id="buttons" class="hidden">
  <button onclick="location.href='database.html'">BACK</button>
  <button onclick="downloadFile()">DOWNLOAD PDF</button>
</div>

<script>

const URL_JSON = "https://script.google.com/macros/s/AKfycbxG2QC7-7XV85pCJA32jLscOaHa_UCoRSeAIlFmtKZ2OC_UVH9riEjxSLaNbcdzDwW4/exec";
const URL_PDF  = "https://script.google.com/macros/s/AKfycbyWOEHcGgdQzfju_kbsvFbO6chxbZY-8eW29rNnD6xipU1IZSx3kOeYZzfZPyWcWRVq/exec";

/* LOADING */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("main").classList.remove("hidden");
  startTyping();
},1000);

/* FETCH DATA SPREADSHEET */
async function fetchData(){
  try{
    const res = await fetch(URL_JSON);
    return await res.json();
  }catch(e){
    console.log(e);
    return [];
  }
}

/* DOWNLOAD PDF */
async function downloadFile(){
  try{
    const res = await fetch(URL_PDF);
    const base64 = await res.text();

    const bin = atob(base64);
    const arr = new Uint8Array(bin.length);

    for(let i=0;i<bin.length;i++){
      arr[i]=bin.charCodeAt(i);
    }

    const blob = new Blob([arr],{type:"application/pdf"});
    const url = URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download="data.pdf";
    a.click();

  }catch(e){
    alert("DOWNLOAD ERROR");
  }
}

/* ANIMASI TERMINAL */
async function startTyping(){

  const t=document.getElementById("terminal");

  let text =
`SYSTEM ONLINE
CONNECTING DATABASE...
STATUS: OK
CLASSIFICATION: `;

  let i=0;

  function type(){
    if(i<text.length){
      t.textContent+=text[i++];
      setTimeout(type,20);
    }else{
      t.innerHTML += "<span style='color:red'>RAHASIA</span>\n\n";
      loadTable();
    }
  }

  type();
}

/* TABLE SPREADSHEET */
async function loadTable(){

  const data = await fetchData();

  let html = `
  <table>
    <tr>
      <th>No</th>
      <th>Jabatan</th>
      <th>Jan</th>
      <th>Feb</th>
      <th>Mar</th>
      <th>Apr</th>
      <th>Mei</th>
      <th>Jun</th>
      <th>Jul</th>
      <th>Agst</th>
      <th>Sept</th>
      <th>Okt</th>
      <th>Nov</th>
      <th>Des</th>
      <th>Keterangan</th>
    </tr>
  `;

  data.forEach((r,i)=>{
    html += `
    <tr>
      <td>${i+1}</td>
      <td>${r.jabatan||""}</td>
      <td>${r.jan||""}</td>
      <td>${r.feb||""}</td>
      <td>${r.mart||""}</td>
      <td>${r.aprl||""}</td>
      <td>${r.mei||""}</td>
      <td>${r.jun||""}</td>
      <td>${r.jul||""}</td>
      <td>${r.agst||""}</td>
      <td>${r.sept||""}</td>
      <td>${r.okt||""}</td>
      <td>${r.nov||""}</td>
      <td>${r.des||""}</td>
      <td>${r.keterangan||""}</td>
    </tr>
    `;
  });

  html += "</table>";

  document.getElementById("tableContainer").innerHTML = html;

  document.getElementById("buttons").classList.remove("hidden");
}

</script>

</body>
</html>
