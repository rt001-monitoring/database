<!DOCTYPE html>

<style>

body{
  background:#000;
  color:#00ff00;
  font-family:"Courier New", monospace;
  margin:0;

/* LOADING */

}

  display:inline-block;

}

    transform:translateX(0);
  }
  to{

}

/* TERMINAL */

  font-size:12px;

}

/* CURSOR */
.typing{
  border-right:2px solid #00ff00;
  animation:blinkCursor .7s infinite;
}

@keyframes blinkCursor{
  50%{
    border-color:transparent;
  }
}

/* BLINK MERAH */
.blink-red{
  color:#ff0000;
  animation:blinkRed .5s infinite;
}

@keyframes blinkRed{
  0%,100%{
    color:#ff0000;
  }

  50%{
    color:#330000;
  }
}

/* BUTTON */
.button-container{
  text-align:center;
  margin-top:15px;
}

button{
  background:#000;
  color:#00ff00;
  border:1px solid #00ff00;
  padding:8px 18px;
  margin:0 5px;
  cursor:pointer;
  border-radius:8px;
  font-family:"Courier New", monospace;
  font-size:12px;
}

button:hover{
  background:#00ff00;
  color:#000;
}

.download-btn{
  border-color:#ff0000;
  color:#ff0000;
  animation:blinkRed .5s infinite;
}

.download-btn:hover{
  background:#ff0000;
  color:#000;
}

/* RESPONSIVE */
@media(max-width:900px){

  pre{
    font-size:10px;
  }
}

@media(max-width:600px){

  pre{
    font-size:8px;
  }
}
table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
  color:#00ff00;
  font-size:12px;
}

th,td{
  border:1px solid #00ff00;
  padding:6px 10px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#001100;
  position:sticky;
  top:0;
  z-index:100;
}

td.nama{
  text-align:left;
}
.title-main{
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin-bottom:5px;
}

.title-sub{
  text-align:center;
  font-size:14px;
  margin-bottom:25px;
}

.info-text{
  font-size:10px;
  line-height:1.6;
  margin-bottom:15px;
}
.info-row{
  display:flex;
  gap:10px;
}

.label{
  width:50px;
}

.value{
  flex:1;
}
thead th{
  position:sticky;
  top:0;
  background:#001100;
  z-index:10;
}
#terminal{
  height:100%;
  display:flex;
  flex-direction:column;
}

#headerArea{
  flex:none;
  background:#000;
  padding-bottom:10px;
}

#tableArea{
  flex:1;
  overflow:auto;
  border-top:1px solid #00ff00;
  border-bottom:1px solid #00ff00;
}

#tableArea thead th{
  position:sticky;
  top:0;
  z-index:100;
  background:#001100;

  border-top:1px solid #00ff00;
  border-bottom:1px solid #00ff00;
  border-left:1px solid #00ff00;
  border-right:1px solid #00ff00;
}

<body>

<!-- LOADING -->
<div id="loading">

<p>>> initializing connection...</p>

<p class="hidden">

<p class="hidden">

</p>

<p class="hidden">
>>> clearance level verified ✓
</p>

<p class="hidden">

</p>

</div>

<!-- MAIN -->
<div id="main" class="hidden">

<div id="runningText">
<span>
DATA INI BERSIFAT RAHASIA - HANYA UNTUK LINGKUNGAN RT 001 RW 001
</span>
</div>

<div id="terminalBox">
<div id="terminal" class="typing"></div>
</div>

</div>

<!-- BUTTON -->
<div class="button-container hidden" id="buttons">

<button onclick="window.location.href='database.html'">
back to DATABASE
</button>

⬇ DOWNLOAD PDF
</button>

</div>

<script>

/* ================= LOADING ================= */

const lines =
document.querySelectorAll("#loading p");

let delay = 700;

lines.forEach((line,idx)=>{

  setTimeout(()=>{

    line.classList.remove("hidden");

    if(idx === lines.length - 1){

      setTimeout(()=>{

        document.getElementById("loading")
        .style.display = "none";

        document.getElementById("main")
        .classList.remove("hidden");

        startTyping();

      },1000);

    }

  },delay * (idx + 1));

});

/* ================= FETCH DATA ================= */

async function fetchData(){

  try{

    const url =
    "https://script.google.com/macros/s/AKfycbxG2QC7-7XV85pCJA32jLscOaHa_UCoRSeAIlFmtKZ2OC_UVH9riEjxSLaNbcdzDwW4/exec";

    const res = await fetch(url);

    if(!res.ok){
      throw new Error("HTTP ERROR");
    }

    return await res.json();

  }catch(err){

    console.error(err);

    return [];

  }

}

/* ================= FIX WIDTH ================= */

function fix(text,len){

  text = String(text || "");

  if(text.length > len){

    return text.substring(0,len-1) + " ";

  }

  return text.padEnd(len," ");

}

/* ================= DOWNLOAD PDF ================= */

async function downloadFile(){

  try{

    const url =
    "https://script.google.com/macros/s/AKfycbyWOEHcGgdQzfju_kbsvFbO6chxbZY-8eW29rNnD6xipU1IZSx3kOeYZzfZPyWcWRVq/exec";

    const response = await fetch(url);

    if(!response.ok){
      throw new Error("HTTP ERROR");
    }

    const base64 = await response.text();

    const binary = atob(base64);

    const bytes = new Uint8Array(binary.length);

    for(let i=0;i<binary.length;i++){

      bytes[i] = binary.charCodeAt(i);

    }

    const blob = new Blob([bytes],{
      type:"application/pdf"
    });

    const blobUrl =
    URL.createObjectURL(blob);

    const link =
    document.createElement("a");

    link.href = blobUrl;

    link.download =
    "iuran_rt001.pdf";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(blobUrl);

  }catch(err){

    alert("DOWNLOAD FAILED");

    console.error(err);

  }

}

/* ================= START ================= */

function startTyping(){

  const terminal =
  document.getElementById("terminal");

  terminal.innerHTML +=
`----------------------------------------------------------------------------------------------------------
FILE           : IURAN WARGA RT 001
CLASSIFICATION : `;

  const span =
  document.createElement("span");

  span.className = "blink-red";

  terminal.appendChild(span);

  const txt = "RAHASIA";

  let i = 0;

  function ketik(){

    if(i < txt.length){

      span.textContent += txt.charAt(i);

      i++;

      setTimeout(ketik,50);

    }else{

      tampilkanData();

    }

  }

  ketik();

}

/* ================= TAMPILKAN DATA ================= */

async function tampilkanData(){

  const terminal =
  document.getElementById("terminal");

  try{

    const data = await fetchData();

    // ambil info atas
    const info = `
  <div class="title-main">
    IURAN BULANAN WARGA RT 001
  </div>

  <div class="title-sub">
    DURI KOSAMBI TH 2026
  </div>

  <div class="info-text">

  <div class="info-row">
    <span class="label">RT/RW</span>
    <span class="value">: 001/004</span>
  </div>

  <div class="info-row">
    <span class="label">KEL/KEC</span>
    <span class="value">: PETIR/CIPONDOH</span>
  </div>

  <div class="info-row">
    <span class="label">KOTA</span>
    <span class="value">: TANGERANG</span>
  </div>

  <div class="info-row">
    <span class="label">PROVINSI</span>
    <span class="value">: BANTEN</span>
  </div>

</div>
`;

    // mulai tabel
    let html = `
    <table>
      <thead>
        <tr>
          <th>NO</th>
          <th>NAMA</th>
          <th>JAN</th>
          <th>FEB</th>
          <th>MART</th>
          <th>APRL</th>
          <th>MEI</th>
          <th>JUN</th>
          <th>JUL</th>
          <th>AGST</th>
          <th>SEPT</th>
          <th>OKT</th>
          <th>NOV</th>
          <th>DES</th>
          <th>JLH</th>
        </tr>
      </thead>
      <tbody>
    `;

    // filter data yg punya nomor
    const warga = data.filter(row => {

  return (
    row.no &&
    !isNaN(row.no)
  );

});

    warga.forEach(row=>{

      html += `
      <tr>
        <td>${row.no || ""}</td>
        <td class="nama">${row.nama || ""}</td>
        <td>${row.jan || ""}</td>
        <td>${row.feb || ""}</td>
        <td>${row.mart || ""}</td>
        <td>${row.aprl || ""}</td>
        <td>${row.mei || ""}</td>
        <td>${row.jun || ""}</td>
        <td>${row.jul || ""}</td>
        <td>${row.agst || ""}</td>
        <td>${row.sept || ""}</td>
        <td>${row.okt || ""}</td>
        <td>${row.nov || ""}</td>
        <td>${row.des || ""}</td>
        <td>${row.jlh || ""}</td>
      </tr>
      `;

    });

    html += `
      </tbody>
    </table>
    `;

    terminal.innerHTML = `
<div id="headerArea">
${info}
</div>

<div id="tableArea">
${html}
</div>
`;

    // selalu mulai dari paling atas
    const terminalBox =
    document.getElementById("terminalBox");

    terminalBox.scrollTop = 0;

    setTimeout(()=>{
      terminalBox.scrollTop = 0;
    },50);

  }catch(err){

    console.error(err);

    terminal.innerHTML =
    `<span style="color:red">SYSTEM ERROR</span>`;

  }

  terminal.classList.remove("typing");

  document.getElementById("buttons")
  .classList.remove("hidden");

}

/* ================= FULLSCREEN ================= */

function forceFullscreen(){

  const elem =
  document.documentElement;

  if(elem.requestFullscreen){

    elem.requestFullscreen()
    .catch(()=>{});

  }

}

document.addEventListener("click",()=>{

  forceFullscreen();

},{ once:true });

</script>
