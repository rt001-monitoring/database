<!-- FULLSCREEN -->

<script>

function forceFullscreen(){

const elem=
document.documentElement;

if(
elem.requestFullscreen
){

elem
.requestFullscreen()
.catch(()=>{});

}

}

function isStandalone(){

return(

window.matchMedia(
"(display-mode: standalone)"
).matches

||

window.navigator
.standalone===true

);

}

if(
isStandalone()
){

setTimeout(
forceFullscreen,
500
);

}

if(

navigator.userAgent
.includes("wv")

||

navigator.userAgent
.includes(
"Android"
)

){

setTimeout(
forceFullscreen,
800
);

}

document
.addEventListener(

"click",

function(){

forceFullscreen();

},

{
once:true
}

);

</script>

<script type="module">

}

import {

getAuth,
signInWithEmailAndPassword

}

import {

getDatabase,

get

}

from

"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

apiKey:

databaseURL:
"https://monitoringlogin-b175c-default-rtdb.asia-southeast1.firebasedatabase.app",

"monitoringlogin-b175c",

storageBucket:
"monitoringlogin-b175c.firebasestorage.app",

messagingSenderId:

appId:
"1:625313862094:web:185f1b4fb5508b0f055b9f",

measurementId:

};

const app=

initializeApp(
firebaseConfig
);

const auth=

getAuth(
app
);

const db=

getDatabase(
app
);

window.loginSuccess=

async function(
event
){

event.preventDefault();

const email=

event.target
.email
.value
.trim();

const password=

event.target
.password
.value
.trim();

try{

await
signInWithEmailAndPassword(

auth,

email,

password

);

/* AMBIL URL DARI FIREBASE */

const snap=

await get(

ref(
db,
"config/redirect"
)

);

const target=

snap.val();

/* REDIRECT */

window.location.href=

target;

}

catch(e){

alert(

e.code+

"\n\n"+

e.message

);

console.log(e);

}

return false;

}

</script>
