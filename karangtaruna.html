<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOGIN PORTAL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Courier New;
overflow:hidden;
}

/* VIDEO */
#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
z-index:-1;
}

/* CONTENT */
.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:400px;
text-align:center;
color:white;
}

h1{
font-size:2em;
margin-bottom:20px;
text-shadow:0 0 10px #00ff00;
line-height:1.2;
}

form{
display:flex;
flex-direction:column;
gap:12px;
}

input{
padding:12px;
border:1px solid #00ff00;
background:rgba(0,0,0,.4);
color:white;
border-radius:5px;
outline:none;
font-size:16px;
text-align:center;
}

button{
padding:12px;
background:#00ff00;
border:none;
border-radius:5px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00cc00;
box-shadow:0 0 10px #00ff00;
}

.status{
margin-top:15px;
font-size:14px;
color:#ffff00;
}
</style>
</head>
<body>

<!-- VIDEO -->
<video id="bg-video" autoplay muted loop playsinline>
<source src="background.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<!-- AUDIO -->
<audio autoplay loop>
<source src="Hymne-TNI-Angkatan-Udara.aac" type="audio/mpeg">
</audio>
<!-- LOGIN -->
<div class="content">
<h1>RT/001 RW/004</h1>
<form id="loginForm">
<input
type="email"
id="email"
placeholder="Email"
required>
<input
type="password"
id="password"
placeholder="Password"
required>
<button type="submit">
LOGIN
</button>
</form>
<div class="status" id="status"></div>
</div>
<!-- FIREBASE -->
<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyCuAf6lFAVhauAmzkRRnMKrkrtuk40Bxi4",
authDomain: "rt001-monitoring-database.firebaseapp.com",
projectId: "rt001-monitoring-database",
storageBucket: "rt001-monitoring-database.firebasestorage.app",
messagingSenderId: "1075136279822",
appId: "1:1075136279822:web:e62f99646db38043e9935f",
measurementId: "G-JXR25RVXJ4"
};
/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
/* FORM */
const form = document.getElementById("loginForm");
const statusBox = document.getElementById("status");
form.addEventListener("submit", async (e)=>{
e.preventDefault();
const email =
document.getElementById("email").value.trim();
const password =
document.getElementById("password").value.trim();
statusBox.innerHTML = "VERIFYING ACCESS...";
try{
await signInWithEmailAndPassword(
auth,
email,
password
);
statusBox.innerHTML = "ACCESS GRANTED ✔";
setTimeout(()=>{
window.location.href = "https://rt001-monitoring.github.io/database/";
},1000);
}
catch(error){
console.log(error);
statusBox.innerHTML =
"ACCESS DENIED ❌";
alert(
error.code + "\n\n" + error.message
);
}
});
</script>
</body>
</html>
```
